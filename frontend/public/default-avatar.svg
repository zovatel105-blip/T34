<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo gris claro -->
  <rect width="100" height="100" fill="#E5E7EB"/>
  <!-- Cabeza: círculo gris medio, parte superior con aire arriba -->
  <circle cx="50" cy="38" r="17" fill="#9CA3AF"/>
  <!-- Hombros: elipse cuya mitad inferior queda fuera del viewBox.
       El overflow del SVG + el rounded-full del Avatar la recortan en curva.
       rx reducido de 40 → 34 para hacer los hombros más estrechos. -->
  <ellipse cx="50" cy="105" rx="37" ry="38" fill="#9CA3AF"/>
</svg>
