<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <!--
    Avatar por defecto — estilo Google Material.
    La silueta está deliberadamente "bajada" y los hombros forman una
    elipse grande cuya mitad inferior queda fuera del viewBox. Al estar
    el contenedor (<Avatar>) con rounded-full + overflow-hidden, el
    recorte resultante es una curva limpia sin líneas horizontales.
  -->
  <rect width="100" height="100" fill="#E5E7EB"/>
  <!-- cabeza -->
  <circle cx="50" cy="54" r="19" fill="#9CA3AF"/>
  <!-- hombros (elipse grande y baja que se recorta suavemente) -->
  <ellipse cx="50" cy="125" rx="42" ry="40" fill="#9CA3AF"/>
</svg>
