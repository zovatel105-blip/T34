<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="100" fill="#E5E7EB"/>
  <!-- Cabeza en posición original (alta) -->
  <circle cx="50" cy="35" r="18" fill="#9CA3AF"/>
  <!-- Hombros: elipse grande cuya mitad inferior queda fuera del viewBox.
       El overflow del SVG + el rounded-full del Avatar la recortan en curva,
       sin mostrar la línea horizontal que tenía el path original. -->
  <ellipse cx="50" cy="100" rx="40" ry="40" fill="#9CA3AF"/>
</svg>
